<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>PORT 81 → 27 → 3 → MAXI · Upgrade</title>

<style>
body {
  background:#111;
  color:#0f0;
  font-family:Consolas, monospace;
  padding:20px;
}
h1 { color:#6f6; }
input {
  width:300px;
  padding:8px;
  background:#222;
  color:#0f0;
  border:1px solid #444;
}
button {
  padding:8px 14px;
  background:#0f0;
  color:#000;
  border:none;
  font-weight:bold;
  cursor:pointer;
}
button:hover { background:#9f9; }
pre {
  background:#000;
  padding:15px;
  border:1px solid #333;
  margin-top:20px;
  color:#0f0;
  overflow:auto;
}
.axis {
  margin-top:20px;
  padding:10px;
  background:#222;
  border:1px solid #333;
}
.axis h2 { margin:0 0 10px 0; }
.A { color:#33ffff; }
.B { color:#ff33ff; }
.C { color:#ffff33; }
</style>
</head>

<body>

<h1>PORT System · Upgrade</h1>

<input id="txt" placeholder="Input">
<button id="run">RUN PORT</button>

<div id="axisA" class="axis A"></div>
<div id="axisB" class="axis B"></div>
<div id="axisC" class="axis C"></div>

<pre id="out"></pre>

<script type="module">
import { PORT_81 } from "./port.js";
import { MAXI } from "./maxi.js";

document.getElementById("run").addEventListener("click", () => {
  const msg = document.getElementById("txt").value;

  const p81 = PORT_81(msg);
  const maxi = MAXI(p81.achsen, msg);

  // JSON-Ausgabe
  document.getElementById("out").textContent =
    JSON.stringify({ p81, maxi }, null, 2);

  // Achsen-Ausgabe
  document.getElementById("axisA").innerHTML =
    `<h2>Achse A (27)</h2>${p81.achsen.A.map(x => x.id).join(", ")}`;

  document.getElementById("axisB").innerHTML =
    `<h2>Achse B (27)</h2>${p81.achsen.B.map(x => x.id).join(", ")}`;

  document.getElementById("axisC").innerHTML =
    `<h2>Achse C (27)</h2>${p81.achsen.C.map(x => x.id).join(", ")}`;
});
</script>

</body>
</html>
